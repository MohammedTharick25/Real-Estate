<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 1. HIGH-END ICON SYSTEM -->
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- 2. PRIMARY SEO METADATA -->
    <title>Estatera — Luxury Living Redefined | Verified Real Estate</title>
    <meta
      name="title"
      content="Estatera — Luxury Living Redefined | Verified Real Estate"
    />
    <meta
      name="description"
      content="Discover verified premium lands and architecturally stunning homes designed for your future. The most trusted platform for high-end real estate."
    />
    <meta
      name="keywords"
      content="real estate, luxury homes, verified land, buy property, Estatera, premium housing"
    />
    <meta name="author" content="Estatera Group" />
    <meta name="theme-color" content="#2563eb" />
    <!-- Estatera Blue -->

    <!-- 3. OPEN GRAPH / FACEBOOK / WHATSAPP -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://estatera.onrender.com/" />
    <meta property="og:title" content="Estatera — Luxury Living Redefined" />
    <meta
      property="og:description"
      content="Browse verified premium properties with professional AI-driven insights and 3D tours."
    />
    <!-- IMPORTANT: Use an absolute URL for the image -->
    <meta
      property="og:image"
      content="https://estatera.onrender.com/og-image.png"
    />

    <!-- 4. TWITTER -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://estatera.onrender.com/" />
    <meta
      property="twitter:title"
      content="Estatera — Luxury Living Redefined"
    />
    <meta
      property="twitter:description"
      content="Browse verified premium properties with professional AI-driven insights and 3D tours."
    />
    <meta
      property="twitter:image"
      content="https://estatera.onrender.com/og-image.png"
    />

    <!-- WHATSAPP FIX: Must be an absolute URL, under 300KB, and preferably a .jpg -->
    <meta
      property="og:image"
      content="https://estatera.onrender.com/og-whatsapp.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://estatera.onrender.com/og-whatsapp.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 5. PERFORMANCE: PRECONNECT TO EXTERNAL SOURCES -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- WORLD CLASS FONT: Inter or Manrope -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent 'flash of unstyled content' */
      body {
        font-family: "Manrope", sans-serif;
        margin: 0;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>
